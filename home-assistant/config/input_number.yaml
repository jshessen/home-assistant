# ============================================================================
# Utility Rate Configuration
# ============================================================================
# Store current electricity rates for easy cost calculation updates
# Adjust these values without editing YAML files
# Rates auto-updated by packages/ameren/ameren_rate_manager.py
# ============================================================================

# Fixed Monthly Charges
ameren_mo_monthly_fixed:
  name: "Ameren MO Monthly Fixed Charge"
  unit_of_measurement: "$"
  min: 0.00
  max: 50.00
  step: 0.01
  icon: mdi:currency-usd
  mode: box
  initial: 9.19  # Customer ($9.00) + Low-Income Pilot ($0.19)

# Summer Rates (June - September)
ameren_mo_summer_rate:
  name: "Ameren MO Summer Rate"
  unit_of_measurement: "$/kWh"
  min: 0.05
  max: 0.25
  step: 0.0001
  icon: mdi:weather-sunny
  mode: box
  initial: 0.1560  # 15.60¢/kWh

# Winter Rates (October - May) - Tiered Pricing
ameren_mo_winter_tier1_rate:
  name: "Ameren MO Winter Tier 1 Rate (0-750 kWh)"
  unit_of_measurement: "$/kWh"
  min: 0.05
  max: 0.25
  step: 0.0001
  icon: mdi:snowflake
  mode: box
  initial: 0.1062  # 10.62¢/kWh

ameren_mo_winter_tier2_rate:
  name: "Ameren MO Winter Tier 2 Rate (>750 kWh)"
  unit_of_measurement: "$/kWh"
  min: 0.05
  max: 0.25
  step: 0.0001
  icon: mdi:snowflake-variant
  mode: box
  initial: 0.0714  # 7.14¢/kWh

ameren_mo_winter_tier1_limit:
  name: "Ameren MO Winter Tier 1 Limit"
  unit_of_measurement: "kWh"
  min: 0
  max: 2000
  step: 50
  icon: mdi:meter-electric
  mode: box
  initial: 750  # kWh breakpoint

