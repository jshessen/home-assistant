# PostgreSQL Recorder Configuration
# High-performance database for Home Assistant history

# PostgreSQL connection (using localhost since HA is on host network)
db_url: postgresql://homeassistant:ha_postgres_fda81663923dcbf8fb15e4c58ec818fc@localhost:5432/homeassistant

# Commit interval: How often to write to database (default: 5 seconds)
# Increase to reduce write frequency and improve performance
commit_interval: 30

# Keep history for 14 days (reduce if you want smaller database)
purge_keep_days: 14

# Auto-purge old data at 4:12 AM daily
auto_purge: true

# Exclude noisy entities that don't need history
exclude:
  entity_globs:
    - sensor.*_last_seen
    - sensor.*_uptime
    - sensor.*_rssi
    - sensor.*_signal_strength
  domains:
    - automation
    - script
    - scene
    - group
