# ========================================================================
# Sunroom Christmas Tree - Template Switch
# ========================================================================
#
# TEMPLATE SWITCH:
#   - switch.sunroom_christmas_tree
#     Friendly name for voice control via Alexa
#
# Controls: switch.outlet_1 (Sunroom Outlet - 1)
# Say "Alexa, turn on Sunroom Christmas Tree" to control the outlet
#
# YAML Anchors defined inline for reuse
# ========================================================================

- switch:
    - name: "Sunroom Christmas Tree"
      unique_id: sunroom_christmas_tree
      icon: mdi:pine-tree

      # Define anchors here on first use
      state: &state_template "{{ is_state('switch.outlet_1', 'on') }}"
      availability: &availability_template "{{ has_value('switch.outlet_1') }}"

      turn_on: &turn_on_action
        action: switch.turn_on
        target:
          entity_id: &physical_switch switch.outlet_1

      turn_off: &turn_off_action
        action: switch.turn_off
        target:
          entity_id: *physical_switch
