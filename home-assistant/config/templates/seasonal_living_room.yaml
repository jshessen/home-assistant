# ========================================================================
# Seasonal Living Room Display - Smart Dynamic Switch + Static Aliases
# ========================================================================
#
# SMART SWITCH (changes with season):
#   - switch.living_room_seasonal_display
#     Shows "Pumpkin" or "Present" based on date
#
# STATIC ALIASES (always available for Alexa):
#   - switch.pumpkin
#   - switch.present
#
# All switches control: switch.in_wall_single_outlet_7 (Living Room Outlet - 1)
# Say either name to Alexa - they both work year-round!
#
# YAML Anchors defined inline for reuse
# ========================================================================

# SMART SWITCH - Auto-updates name and icon based on current season
# References input_select.active_holiday (maintained by holiday_season_controller automation)
- switch:
    - name: >
        {% set season = states('input_select.active_holiday') %}
        {% if season in ['Halloween', 'Thanksgiving'] %}
          Pumpkin
        {% elif season in ['Christmas', 'New Years'] %}
          Present
        {% elif season == 'Easter' %}
          Bunny
        {% elif season == 'Independence Day' %}
          Flag
        {% else %}
          Living Room Display
        {% endif %}

      unique_id: living_room_seasonal_display
      default_entity_id: switch.living_room_seasonal_display

      icon: >
        {% set season = states('input_select.active_holiday') %}
        {{ {
          'Halloween': 'mdi:pumpkin',
          'Thanksgiving': 'mdi:pumpkin',
          'Christmas': 'mdi:gift',
          'New Years': 'mdi:gift',
          'Easter': 'mdi:rabbit',
          'Independence Day': 'mdi:flag-variant',
          'None': 'mdi:power-socket-us'
        }.get(season, 'mdi:power-socket-us') }}

      # Define anchors here on first use
      state: &state_template "{{ is_state('switch.in_wall_single_outlet_7', 'on') }}"
      availability: &availability_template "{{ has_value('switch.in_wall_single_outlet_7') }}"

      turn_on: &turn_on_action
        action: switch.turn_on
        target:
          entity_id: &physical_switch switch.in_wall_single_outlet_7

      turn_off: &turn_off_action
        action: switch.turn_off
        target:
          entity_id: *physical_switch

# STATIC ALIASES - Always available with consistent names for Alexa

# Pumpkin (October - Thanksgiving)
- switch:
    - name: "Pumpkin"
      unique_id: seasonal_living_room_pumpkin
      icon: mdi:pumpkin
      state: *state_template
      availability: *availability_template
      turn_on: *turn_on_action
      turn_off: *turn_off_action

# Present (Thanksgiving - Epiphany)
- switch:
    - name: "Present"
      unique_id: seasonal_living_room_present
      icon: mdi:gift
      state: *state_template
      availability: *availability_template
      turn_on: *turn_on_action
      turn_off: *turn_off_action
