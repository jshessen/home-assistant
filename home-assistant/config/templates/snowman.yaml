# ========================================================================
# Snowman - Template Switch
# ========================================================================
#
# TEMPLATE SWITCH:
#   - switch.snowman
#     Friendly name for voice control via Alexa
#
# Controls: switch.outlet_2 (Outlet - 5)
# Say "Alexa, turn on Snowman" to control the outlet
#
# YAML Anchors defined inline for reuse
# ========================================================================

- switch:
    - name: "Snowman"
      unique_id: snowman_outlet_5
      icon: mdi:snowman

      # Define anchors here on first use
      state: &state_template "{{ is_state('switch.outlet_2', 'on') }}"
      availability: &availability_template "{{ has_value('switch.outlet_2') }}"

      turn_on: &turn_on_action
        action: switch.turn_on
        target:
          entity_id: &physical_switch switch.outlet_2

      turn_off: &turn_off_action
        action: switch.turn_off
        target:
          entity_id: *physical_switch
