# Root-level pyproject.toml for Home Assistant Docker Workspace

[tool.ruff]
# Basic configuration
line-length = 100
indent-width = 4
fix = true
force-exclude = true
target-version = "py313"
required-version = ">=0.8.0"

# Exclude common directories from linting
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".mypy_cache",
    ".pytest_cache",
    ".tox",
    "*.egg-info",
    "home-assistant/config/custom_components",
    "keymaster-github/custom_components",
    "home-assistant/config/.storage",
    "home-assistant/config/deps",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint]
# Minimal rule set - individual projects can extend this
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "W",  # pycodestyle warnings
]

ignore = [
    "E501",  # line too long - handled by formatter
]

[tool.mypy]
# Mypy configuration for workspace
platform = "linux"
python_version = "3.13"
follow_imports = "silent"
ignore_missing_imports = true

# Exclude subprojects with their own config
exclude = [
    "^keymaster-github/",  # Has its own config
    "^home-assistant/config/custom_components/",
    "^home-assistant/config/.storage/",
    "^home-assistant/config/deps/",
]

# Basic type checking
check_untyped_defs = true
disable_error_code = ["import-not-found", "import-untyped"]
disallow_untyped_defs = false
show_error_codes = true
warn_return_any = false
warn_unused_configs = true

[tool.pylint]
# Ignore test directories, custom_components, and subprojects
ignore = [
    "keymaster-github",
    "custom_components",
    ".storage",
    "deps",
]
jobs = 2
persistent = false

[tool.pylint.basic]
argument-naming-style = "snake_case"
attr-naming-style = "snake_case"

[tool.pylint.format]
expected-line-ending-format = "LF"
max-line-length = 100

[tool.pylint."messages control"]
# Minimal disabled checks - projects can extend
disable = [
    "format",  # Handled by ruff/black
    "locally-disabled",
    "fixme",
]

[tool.pylint.typecheck]
# Ignore homeassistant imports - available in venv
ignored-modules = ["homeassistant", "homeassistant.*"]
generated-members = ["homeassistant.*"]

[tool.pytest.ini_options]
# Test discovery paths
testpaths = [
    "home-assistant/config/python_scripts",
    "home-assistant/ha-external-connector/tests",
    "keymaster-github/tests",
]
norecursedirs = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
]
