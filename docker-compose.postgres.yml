# PostgreSQL Database for Home Assistant
##############################
# NETWORKS
#
networks:
  default:
    name: home-automation
    external: true
#
##############################

##############################
# VOLUMES
#
volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      device: ./postgres/data
      o: bind
#
##############################

##############################
# SECRETS (Non-Swarm)
#
secrets:
  postgres_password:
    file: ./secrets/postgres_password
#
##############################

##############################
# SERVICES
#
services:
  ##########
  # PostgreSQL - Database for Home Assistant recorder
  #
  homeassistant-postgres:
    image: postgres:16-alpine
    container_name: homeassistant-postgres
    restart: unless-stopped
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    networks:
      - default
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USER: ${POSTGRES_USER:-homeassistant}
      POSTGRES_DB: ${POSTGRES_DB:-homeassistant}
      TZ: ${TZ}
  #
  ##########
#
##############################
